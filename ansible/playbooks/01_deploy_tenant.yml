---
# =============================================================================
# Stage 1 - Deploy BIG-IP Tenant on rSeries via F5OS API
# =============================================================================

- name: Deploy rSeries BIG-IP Tenant
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/migration_vars.yml

  tasks:

    - name: Create tenant on rSeries via F5OS REST API
      uri:
        url: "https://{{ rseries_host }}:{{ rseries_api_port }}/api/data/f5-tenants:tenants"
        method: POST
        user: "{{ rseries_user }}"
        password: "{{ lookup('env', 'RSERIES_PASSWORD') }}"
        force_basic_auth: true
        validate_certs: "{{ rseries_validate_certs }}"
        status_code: [200, 201, 204]
        body_format: json
        headers:
          Content-Type: "application/yang-data+json"
        body:
          f5-tenants:tenant:
            - name: "{{ tenant_name }}"
              config:
                name: "{{ tenant_name }}"
                image: "{{ tenant_image }}"
                mgmt-ip: "{{ tenant_mgmt_ip }}"
                prefix-length: "{{ tenant_mgmt_prefix }}"
                gateway: "{{ tenant_mgmt_gateway }}"
                vlans: "{{ tenant_vlans }}"
                vcpu-cores-per-node: "{{ tenant_vcpus }}"
                memory: "{{ tenant_memory }}"
                storage:
                  size: "{{ tenant_disk_size }}"
                running-state: "{{ tenant_state }}"
      register: tenant_create_result

    - name: Wait for tenant to reach Running state
      uri:
        url: "https://{{ rseries_host }}:{{ rseries_api_port }}/api/data/f5-tenants:tenants/tenant={{ tenant_name }}/state/status"
        method: GET
        user: "{{ rseries_user }}"
        password: "{{ lookup('env', 'RSERIES_PASSWORD') }}"
        force_basic_auth: true
        validate_certs: "{{ rseries_validate_certs }}"
        headers:
          Content-Type: "application/yang-data+json"
      register: tenant_status
      until: >
        tenant_status.json is defined and
        'Running' in (tenant_status.json.get('f5-tenants:status', ''))
      retries: 40
      delay: 30
      failed_when: >
        tenant_status.json is not defined or
        'Failed' in (tenant_status.json.get('f5-tenants:status', ''))

    - name: Print tenant status
      debug:
        msg: "Tenant {{ tenant_name }} is Running at {{ tenant_mgmt_ip }}"

    - name: Wait additional time for BIG-IP TMOS to fully boot
      pause:
        seconds: 60
        prompt: "Waiting for BIG-IP TMOS to fully initialize inside tenant..."

    # -------------------------------------------------------------------------
    # Change admin and root passwords on the new tenant
    # Default credentials are admin/admin - change immediately after boot
    # -------------------------------------------------------------------------

    - name: Change admin password on BIG-IP tenant
      uri:
        url: "https://{{ tenant_mgmt_ip }}/mgmt/tm/auth/user/admin"
        method: PATCH
        user: admin
        password: admin
        force_basic_auth: true
        validate_certs: false
        status_code: [200, 201]
        body_format: json
        headers:
          Content-Type: "application/json"
        body:
          password: "{{ lookup('env', 'TENANT_ADMIN_PASSWORD_NEW') }}"
          passwordConfirm: "{{ lookup('env', 'TENANT_ADMIN_PASSWORD_NEW') }}"
      register: admin_password_result
      retries: 5
      delay: 15
      until: admin_password_result.status in [200, 201]

    - name: Confirm admin password change
      debug:
        msg: "Admin password changed successfully on {{ tenant_mgmt_ip }}"

    - name: Change root password on BIG-IP tenant
      uri:
        url: "https://{{ tenant_mgmt_ip }}/mgmt/tm/auth/user/root"
        method: PATCH
        user: admin
        password: "{{ lookup('env', 'TENANT_ADMIN_PASSWORD_NEW') }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200, 201]
        body_format: json
        headers:
          Content-Type: "application/json"
        body:
          password: "{{ lookup('env', 'TENANT_ROOT_PASSWORD_NEW') }}"
          passwordConfirm: "{{ lookup('env', 'TENANT_ROOT_PASSWORD_NEW') }}"
      register: root_password_result
      retries: 5
      delay: 15
      until: root_password_result.status in [200, 201]

    - name: Confirm root password change
      debug:
        msg: "Root password changed successfully on {{ tenant_mgmt_ip }}"

    - name: Verify new admin password works
      uri:
        url: "https://{{ tenant_mgmt_ip }}/mgmt/tm/sys/version"
        method: GET
        user: admin
        password: "{{ lookup('env', 'TENANT_ADMIN_PASSWORD_NEW') }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200]
      register: verify_result
      retries: 3
      delay: 10
      until: verify_result.status == 200

    - name: Print completion message
      debug:
        msg: "Tenant {{ tenant_name }} deployed and passwords set successfully at {{ tenant_mgmt_ip }}"
