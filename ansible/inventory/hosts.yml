---
all:
  children:

    # -------------------------------------------------------------------------
    # rSeries F5OS Platform Layer
    # -------------------------------------------------------------------------
    rseries:
      hosts:
        rseries_appliance:
          ansible_host: "{{ rseries_host }}"
          ansible_user: "{{ rseries_user }}"
          ansible_password: "{{ lookup('env', 'RSERIES_PASSWORD') }}"
          ansible_connection: httpapi
          ansible_httpapi_use_ssl: true
          ansible_httpapi_validate_certs: false
          ansible_network_os: f5networks.f5os.f5os

    # -------------------------------------------------------------------------
    # BIG-IP Tenant (populated after tenant is deployed)
    # -------------------------------------------------------------------------
    bigip_tenant:
      hosts:
        bigip_rseries:
          ansible_host: "{{ tenant_mgmt_ip }}"
          ansible_user: admin
          ansible_password: "{{ lookup('env', 'TENANT_PASSWORD') }}"
          ansible_connection: httpapi
          ansible_httpapi_use_ssl: true
          ansible_httpapi_validate_certs: false
          ansible_network_os: f5networks.f5_modules.bigip

    # -------------------------------------------------------------------------
    # Source iSeries (SSH access for SCF pull and master key)
    # -------------------------------------------------------------------------
    iseries:
      hosts:
        iseries_source:
          ansible_host: "{{ iseries_host }}"
          ansible_user: "{{ iseries_user }}"
          ansible_password: "{{ lookup('env', 'ISERIES_PASSWORD') }}"
          ansible_connection: ssh

    # -------------------------------------------------------------------------
    # Localhost for SCF editing and file handling
    # -------------------------------------------------------------------------
    local:
      hosts:
        localhost:
          ansible_connection: local
